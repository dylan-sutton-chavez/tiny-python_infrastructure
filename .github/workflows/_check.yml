name: _Check

on:
  workflow_call:

jobs:
  lint:
    name: Clippy & Shear
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-shear
        run: cargo install cargo-shear
        working-directory: compiler

      # Detects declared but unused dependencies.
      - name: Shear (unused deps)
        run: cargo shear
        working-directory: compiler

      # Lint for native targets (windows, linux, macos).
      - name: Clippy (native)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: compiler

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Install wasm target (nightly)
        run: rustup target add wasm32-unknown-unknown --toolchain nightly
        working-directory: compiler

      - name: Clippy (wasm)
        run: cargo +nightly clippy --lib --target wasm32-unknown-unknown --features wasm -- -D warnings
        working-directory: compiler