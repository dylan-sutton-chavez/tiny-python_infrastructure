on:
  workflow_call:

jobs:
  build:
    name: WebAssembly
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install target
        run: rustup target add wasm32-unknown-unknown
        working-directory: compiler

      - name: Install CLI Tools
        run: |
          cargo install cargo-shear
          sudo apt update
          sudo apt-get install -y binaryen
        working-directory: compiler

      - name: Build
        run: cargo build --target wasm32-unknown-unknown --features wasm --lib --release
        working-directory: compiler

      - name: Unused Code
        run: cargo shear && cargo clippy --lib --target wasm32-unknown-unknown --features wasm
        working-directory: compiler

      - name: Size
        run: ls -lh target/wasm32-unknown-unknown/release/compiler_lib.wasm
        working-directory: compiler

      - name: Optimize
        run: |
          wasm-opt -Oz --converge --strip-debug \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            -o target/wasm32-unknown-unknown/release/compiler_lib.wasm \
            target/wasm32-unknown-unknown/release/compiler_lib.wasm
        working-directory: compiler

      - name: Size (optimized)
        run: ls -lh target/wasm32-unknown-unknown/release/compiler_lib.wasm
        working-directory: compiler

      - name: Test
        run: cargo test --features wasm-tests
        working-directory: compiler

      - name: Upload WASM Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: compiler/target/wasm32-unknown-unknown/release/compiler_lib.wasm
          token: ${{ secrets.RELEASE_TOKEN }}