name: pipeline

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  native:
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: edge

          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: edge.exe

          - name: Mac
            os: macos-latest
            target: aarch64-apple-darwin
            binary: edge

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: compiler

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: "rust-src, clippy"

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Size
        run: ls -lh target/${{ matrix.target }}/release/${{ matrix.binary }}
        shell: bash

      - name: Test
        run: cargo test

      - name: Install CLI Tools
        run: cargo install cargo-shear cargo-bloat

      - name: Unused Code
        run: cargo shear && cargo clippy --target ${{ matrix.target }}

      - name: Bloat
        run: cargo bloat --release --target ${{ matrix.target }} --crates -n 7

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: compiler/target/${{ matrix.target }}/release/${{ matrix.binary }}

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compiler

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target wasm32-unknown-unknown --features wasm --lib

      - name: Test
        run: cargo test --features wasm

      - name: Unused Code
        run: cargo shear && cargo clippy --target wasm32-unknown-unknown --features wasm

      - name: Install WASM Tools
        run: |
          cargo install twiggy
          sudo apt-get install -y binaryen

      - name: Optimize
        run: wasm-opt -Oz --strip-debug target/wasm32-unknown-unknown/release/compiler_lib.wasm -o target/wasm32-unknown-unknown/release/compiler_lib.wasm

      - name: Size
        run: ls -lh target/wasm32-unknown-unknown/release/compiler_lib.wasm

      - name: Bloat
        run: twiggy top target/wasm32-unknown-unknown/release/compiler_lib.wasm -n 10

      - name: Test WASM
        run: node tests/wasm.mjs

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: compiler/target/wasm32-unknown-unknown/release/compiler_lib.wasm